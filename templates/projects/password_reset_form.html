{% extends "base.html" %}
{% block content %}
<div class="rise-in max-w-sm mx-auto mt-16 px-4 pb-12">
    <div class="card rounded-xl p-6">
        <h1 class="text-xl font-semibold mb-1 text-white tracking-tight">Reset your password</h1>
        <p class="text-sm text-gray-500 mb-6">Enter your account's email and we'll send you a link to reset it.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-xs text-red-400 mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-primary w-full px-4 py-2 rounded-lg font-medium">Send reset link</button>
        </form>

        <p class="text-sm text-gray-500 mt-5 text-center">
            <a href="{% url 'projects:login' %}" class="text-accent hover:underline">Back to log in</a>
        </p>
    </div>
</div>
{% endblock content %}
