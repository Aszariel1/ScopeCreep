{% load static %}
{% if is_artist and deleted_categories %}
<div id="bottom-bar" class="fixed bottom-0 left-0 right-0 z-40 card !rounded-none !border-x-0 !border-b-0">
    <div class="max-w-5xl mx-auto px-4 py-2 flex items-center justify-center gap-2">
        <div class="relative">
            <button type="button" id="deleted-toggle" class="btn w-10 h-10 rounded-full flex items-center justify-center text-gray-300" title="Restore">
                {% include "icons/rotate-ccw.html" with cls="w-4 h-4" %}
            </button>
            <div id="deleted-panel" class="hidden absolute bottom-full right-0 mb-2 card rounded-lg p-3 w-64 max-w-[90vw] text-sm text-gray-200">
                <p class="text-xs font-semibold text-gray-500 tracking-wider mb-2">RESTORE</p>
                {% for category in deleted_categories %}
                <form method="post" action="{% url 'projects:restore_category' project.token_artist category.id %}" class="flex items-center justify-between gap-2 py-1.5{% if not forloop.last %} border-b border-white/10{% endif %}">
                    {% csrf_token %}
                    <span class="truncate text-gray-300">{{ category.category_name }}</span>
                    <button type="submit" class="btn text-xs px-2 py-1 rounded-lg text-gray-200 shrink-0">Restore</button>
                </form>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endif %}
