{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="rise-in max-w-xl mx-auto mt-12 px-4 pb-12">
    <div id="active-projects" class="mb-8"></div>

    <div class="card rounded-xl p-6">
        <h1 class="text-xl font-semibold mb-1 text-white tracking-tight">New project</h1>
        <p class="text-sm text-gray-500 mb-6">Log client change requests and keep every extra billable.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Project name</label>
                <input type="text" name="name" required class="field w-full rounded-lg px-3 py-2 text-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Project type</label>
                <select name="project_type" required class="field w-full rounded-lg px-3 py-2 text-gray-100">
                    <option value="3d_art">3D Art</option>
                    <option value="graphic_design">Graphic Design</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Description</label>
                <textarea name="description" rows="4" class="field w-full rounded-lg px-3 py-2 text-gray-100"></textarea>
            </div>

            <button type="submit" class="btn-primary w-full px-4 py-2 rounded-lg font-medium">Create project</button>
        </form>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{% static 'js/home.js' %}" defer></script>
{% endblock extra_js %}
