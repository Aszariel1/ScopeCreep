{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ScopeCreep{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
                    colors: {
                        accent: { DEFAULT: '#6366f1', hover: '#4f46e5' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body class="text-gray-100 min-h-screen overflow-x-hidden font-sans">
    <header class="card !rounded-none !border-x-0 !border-t-0">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-2">
            <span class="w-2 h-2 rounded-sm bg-accent shrink-0"></span>
            <a href="/" class="text-base font-semibold tracking-tight text-white">ScopeCreep</a>
        </div>
    </header>
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
